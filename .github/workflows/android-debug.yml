name: Android Debug Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: android-debug-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties', 'android/settings.gradle.kts', 'pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Sign APK with persistent keystore
        env:
          DEBUG_KEYSTORE_B64: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: |
          echo "$DEBUG_KEYSTORE_B64" | base64 --decode > /tmp/debug.keystore
          APK="build/app/outputs/flutter-apk/app-debug.apk"
          jarsigner -keystore /tmp/debug.keystore \
            -storepass android -keypass android \
            -signedjar /tmp/app-signed.apk "$APK" androiddebugkey
          mv /tmp/app-signed.apk "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chatmorphism-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
